services:
  - type: web
    name: line-wars-server
    runtime: docker
    plan: free
    rootDirectory: line-wars  # ← ADD THIS LINE
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LINE_WARS_PORT
        value: 8080
    healthCheckPath: /api/health
