# Render deployment configuration
# Free tier: 512MB RAM, 0.5 CPU, spins down after 15 min inactivity

services:
  - type: web
    name: iq-arena-api
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LINE_WARS_PORT
        value: 8080
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health
